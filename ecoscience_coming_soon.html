<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecoscience — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FCFDFB;
    --ink: #0A2E87;
    --ink-soft: #4A5B7A;
    --ink-mute: #8B96A8;
    --green: #108439;
    --green-soft: #4FA94F;
    --green-light: #D5EBD8;
    --water: #2585E1;
    --water-soft: #6FB7E8;
    --water-light: #D6EAF8;
    --rule: #E5E8EF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Ambient orbs */
  .ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.45;
    animation: drift 26s ease-in-out infinite;
  }
  .orb-green {
    width: 580px; height: 580px;
    background: radial-gradient(circle, #79CB7E 0%, transparent 70%);
    top: -120px; left: -140px;
  }
  .orb-blue {
    width: 620px; height: 620px;
    background: radial-gradient(circle, #6FB7E8 0%, transparent 70%);
    bottom: -160px; right: -160px;
    animation-delay: -10s;
  }
  .orb-accent {
    width: 360px; height: 360px;
    background: radial-gradient(circle, #B5DCF0 0%, transparent 70%);
    top: 50%; right: 18%;
    opacity: 0.25;
    animation-delay: -18s;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, -20px) scale(1.05); }
    66% { transform: translate(-30px, 30px) scale(0.95); }
  }

  /* Page */
  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 28px clamp(20px, 5vw, 56px);
  }

  /* Top */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0;
    animation: fade 1.2s ease-out 0.1s forwards;
  }
  .top .wm {
    font-family: 'Manrope', sans-serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.005em;
    text-transform: none;
    line-height: 1;
  }
  .top .wm .eco { color: var(--green); }
  .top .wm .sci { color: var(--water); }
  .top .pill {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 6px 14px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(6px);
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green-soft);
    box-shadow: 0 0 0 3px rgba(79, 169, 79, 0.2);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(79,169,79,0.2); }
    50% { box-shadow: 0 0 0 6px rgba(79,169,79,0.05); }
  }

  /* Hero */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: clamp(20px, 3vh, 36px);
  }
  .hero .logo {
    width: clamp(140px, 16vw, 210px);
    height: auto;
    filter: drop-shadow(0 16px 36px rgba(10, 46, 135, 0.14));
    opacity: 0;
    animation: rise 1.4s cubic-bezier(.2,.7,.2,1) 0.2s forwards;
  }
  .hero .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--green);
    font-weight: 500;
    opacity: 0;
    animation: rise 1.2s ease-out 0.4s forwards;
  }
  .hero .eyebrow::before, .hero .eyebrow::after {
    content: '';
    width: 28px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green));
  }
  .hero .eyebrow::after {
    background: linear-gradient(90deg, var(--green), transparent);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(64px, 12vw, 188px);
    line-height: 0.92;
    letter-spacing: -0.04em;
    font-variation-settings: "opsz" 144, "SOFT" 50;
    color: var(--ink);
    opacity: 0;
    animation: rise 1.6s cubic-bezier(.2,.7,.2,1) 0.55s forwards;
  }
  h1 .soon {
    font-style: italic;
    font-weight: 400;
    color: var(--green);
    font-variation-settings: "opsz" 144, "SOFT" 100;
  }
  h1 .dot {
    display: inline-block;
    color: var(--water);
    width: auto; height: auto;
    background: none;
    box-shadow: none;
    animation: none;
    margin-left: -0.05em;
  }

  .tag {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(17px, 1.8vw, 24px);
    line-height: 1.45;
    color: var(--ink-soft);
    letter-spacing: 0.005em;
    opacity: 0;
    animation: rise 1.2s ease-out 0.85s forwards;
    font-variation-settings: "opsz" 36, "SOFT" 100;
  }
  .tag .a { color: var(--ink); font-style: normal; font-weight: 400; }
  .tag .b { color: var(--green); font-style: normal; font-weight: 400; }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    font-size: 14px;
    color: var(--ink-soft);
    opacity: 0;
    animation: fade 1.2s ease-out 1.1s forwards;
  }
  .footer a {
    color: var(--ink);
    text-decoration: none;
    font-weight: 500;
    position: relative;
    transition: color 0.3s ease;
  }
  .footer a::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0;
    height: 1px;
    background: currentColor;
    transition: width 0.4s cubic-bezier(.2,.7,.2,1);
  }
  .footer a:hover::after { width: 100%; }
  .footer .email {
    display: inline-flex;
    align-items: center;
    gap: 9px;
  }
  .footer .email .icon {
    width: 17px;
    height: 17px;
    color: var(--green);
    flex-shrink: 0;
    stroke-width: 1.8;
  }
  .footer .email a { color: var(--green); }
  .footer .web a { color: var(--water); }
  .footer .mid {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }

  @keyframes fade { to { opacity: 1; } }
  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 720px) {
    .footer { flex-direction: column; gap: 10px; text-align: center; }
    .footer .mid { order: -1; }
    .top { font-size: 9.5px; }
  }
</style>
</head>
